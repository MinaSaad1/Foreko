<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030712" />
    <meta name="description" content="Foresee — a local forecasting studio. Turn a CSV into a trustworthy forecast with uncertainty ranges, a recommended model, and plain-English explanations. Your data stays on your machine." />
    <meta property="og:title" content="Foresee — local forecasting studio" />
    <meta property="og:description" content="Forecast your numbers. Understand why they move. A local-first forecasting app for business users." />
    <meta property="og:type" content="website" />
    <title>Foresee</title>
    <link rel="icon" type="image/png" href="/foresee-logo.png" />
    <link rel="apple-touch-icon" href="/foresee-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("foresee.theme");
          var theme =
            stored === "dark" || stored === "light"
              ? stored
              : window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          document.documentElement.classList.add(theme);
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body class="bg-bg-base text-text-primary font-body antialiased selection:bg-accent selection:text-bg-base">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
