<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="eye-clip-fav">
      <path d="M 2,16 C 7,5 25,5 30,16 C 25,27 7,27 2,16 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" fill="#0F172A"/>

  <!-- Eye fill -->
  <path
    d="M 2,16 C 7,5 25,5 30,16 C 25,27 7,27 2,16 Z"
