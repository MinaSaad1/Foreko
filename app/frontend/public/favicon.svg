  />

  <!-- Trend sparkline -->
  <g clip-path="url(#eye-clip-fav)">
    <path
      d="M 6,20 C 9,21.5 10,17.5 13,16.5 C 15,15.8 15,18.5 18,17 C 21,15.5 22,12 25,10"
      fill="none"
