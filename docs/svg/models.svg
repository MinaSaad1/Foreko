<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="TimesFM vs LightGBM comparison">
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1722"/>
      <stop offset="100%" stop-color="#0a1119"/>
    </linearGradient>
    <linearGradient id="vsline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00B8C9" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00B8C9" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00B8C9" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="320" fill="url(#mbg)"/>

  <!-- vs divider -->
  <line x1="600" y1="40" x2="600" y2="280" stroke="url(#vsline)" stroke-width="1.5"/>
  <text x="600" y="166" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" letter-spacing="0.32em" fill="#00B8C9">VS</text>

  <!-- left model -->
  <g transform="translate(80, 60)">
    <text font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.2em" fill="#00B8C9">PRIMARY</text>
    <text y="42" font-family="Outfit, Inter, sans-serif" font-size="32" font-weight="600" fill="#F0F2F5">TimesFM 2.5</text>
    <text y="68" font-family="Outfit, Inter, sans-serif" font-size="13" fill="#A8B0BC">Google's 200M-param pretrained foundation model.</text>
    <text y="86" font-family="Outfit, Inter, sans-serif" font-size="13" fill="#A8B0BC">Zero-shot inference, no training step needed.</text>

    <!-- tags -->
    <g font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="0.15em" fill="#A8B0BC">
      <g transform="translate(0, 110)">
        <rect x="0" y="0" width="100" height="22" fill="none" stroke="#5a6c83"/>
        <text x="50" y="15" text-anchor="middle">FOUNDATION</text>
      </g>
      <g transform="translate(110, 110)">
        <rect x="0" y="0" width="80" height="22" fill="none" stroke="#5a6c83"/>
        <text x="40" y="15" text-anchor="middle">CUDA-OPT</text>
      </g>
      <g transform="translate(200, 110)">
        <rect x="0" y="0" width="80" height="22" fill="none" stroke="#5a6c83"/>
        <text x="40" y="15" text-anchor="middle">ZERO-SHOT</text>
      </g>
    </g>

    <text y="170" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="0.2em" fill="#5a6c83">STRENGTHS</text>
    <g font-family="Outfit, Inter, sans-serif" font-size="13" fill="#A8B0BC">
      <text y="195">▸ Long, irregular series</text>
      <text y="218">▸ Cold start, no history to train on</text>
      <text y="241">▸ Surprising patterns the baseline misses</text>
    </g>
  </g>

  <!-- right model -->
  <g transform="translate(640, 60)">
    <text font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.2em" fill="#00B8C9">CHALLENGER</text>
    <text y="42" font-family="Outfit, Inter, sans-serif" font-size="32" font-weight="600" fill="#F0F2F5">LightGBM</text>
    <text y="68" font-family="Outfit, Inter, sans-serif" font-size="13" fill="#A8B0BC">Gradient-boosted trees with lag + rolling features.</text>
    <text y="86" font-family="Outfit, Inter, sans-serif" font-size="13" fill="#A8B0BC">Trains in seconds, includes quantile P10 / P90.</text>

    <g font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="0.15em" fill="#A8B0BC">
      <g transform="translate(0, 110)">
        <rect x="0" y="0" width="80" height="22" fill="none" stroke="#5a6c83"/>
        <text x="40" y="15" text-anchor="middle">BASELINE</text>
      </g>
      <g transform="translate(90, 110)">
        <rect x="0" y="0" width="80" height="22" fill="none" stroke="#5a6c83"/>
        <text x="40" y="15" text-anchor="middle">QUANTILE</text>
      </g>
      <g transform="translate(180, 110)">
        <rect x="0" y="0" width="120" height="22" fill="none" stroke="#5a6c83"/>
        <text x="60" y="15" text-anchor="middle">FEATURE-DRIVEN</text>
      </g>
    </g>

    <text y="170" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="0.2em" fill="#5a6c83">STRENGTHS</text>
    <g font-family="Outfit, Inter, sans-serif" font-size="13" fill="#A8B0BC">
      <text y="195">▸ Strong calendar / lag effects</text>
      <text y="218">▸ Honest P10 / P90 from quantile regression</text>
      <text y="241">▸ Fast retraining on each new run</text>
    </g>
  </g>

  <!-- bottom rule -->
  <text x="600" y="296" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.22em" fill="#5a6c83">FOREKO RUNS BOTH, BACKTESTS BOTH, AND SHOWS THE WINNER</text>
</svg>
