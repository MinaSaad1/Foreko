<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" role="img" aria-label="Foreko workflow: data, preflight, forecast, diagnose, operate">
  <defs>
    <linearGradient id="wfbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1722"/>
      <stop offset="100%" stop-color="#0a1119"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="200" fill="url(#wfbg)"/>

  <!-- horizontal flow line -->
  <line x1="80" y1="100" x2="1120" y2="100" stroke="#00B8C9" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="80" y1="100" x2="1120" y2="100" stroke="#00B8C9" stroke-width="2" stroke-dasharray="2 4" stroke-opacity="0.4"/>

  <!-- 5 stations -->
  <g font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.15em" fill="#A8B0BC">
    <!-- station 1: data -->
    <g transform="translate(140, 100)">
      <circle r="36" fill="#0a1119" stroke="#00B8C9" stroke-width="2"/>
      <text y="-50" text-anchor="middle" fill="#00B8C9" font-size="10">01</text>
      <g transform="translate(-12, -10)" stroke="#00B8C9" stroke-width="1.8" fill="none">
        <rect x="0" y="0" width="24" height="20" rx="1"/>
        <line x1="0" y1="6" x2="24" y2="6"/>
        <line x1="8" y1="6" x2="8" y2="20"/>
      </g>
      <text y="60" text-anchor="middle" font-weight="500">INGEST</text>
      <text y="78" text-anchor="middle" fill="#5a6c83" font-size="10" letter-spacing="0.05em">CSV / DB / sample</text>
    </g>

    <!-- station 2: preflight -->
    <g transform="translate(380, 100)">
      <circle r="36" fill="#0a1119" stroke="#5a6c83" stroke-width="2"/>
      <text y="-50" text-anchor="middle" fill="#00B8C9" font-size="10">02</text>
      <g transform="translate(-12, -12)" stroke="#A8B0BC" stroke-width="1.8" fill="none">
        <path d="M 0 12 L 8 20 L 24 4"/>
      </g>
      <text y="60" text-anchor="middle" font-weight="500">PREFLIGHT</text>
      <text y="78" text-anchor="middle" fill="#5a6c83" font-size="10" letter-spacing="0.05em">quality + seasonality</text>
    </g>

    <!-- station 3: forecast (highlight) -->
    <g transform="translate(620, 100)">
      <circle r="44" fill="#00B8C9" fill-opacity="0.15" stroke="#00B8C9" stroke-width="2.5"/>
      <text y="-58" text-anchor="middle" fill="#00B8C9" font-size="10">03</text>
      <g transform="translate(-16, -10)" stroke="#00B8C9" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="0,16 6,10 12,14 18,4 24,8 32,2"/>
      </g>
      <text y="68" text-anchor="middle" font-weight="600" fill="#00B8C9">FORECAST</text>
      <text y="86" text-anchor="middle" fill="#5a6c83" font-size="10" letter-spacing="0.05em">TimesFM vs LightGBM</text>
    </g>

    <!-- station 4: diagnose -->
    <g transform="translate(860, 100)">
      <circle r="36" fill="#0a1119" stroke="#5a6c83" stroke-width="2"/>
      <text y="-50" text-anchor="middle" fill="#00B8C9" font-size="10">04</text>
      <g transform="translate(-12, -10)" stroke="#A8B0BC" stroke-width="1.8" fill="none">
        <circle cx="10" cy="10" r="8"/>
        <line x1="16" y1="16" x2="22" y2="22"/>
      </g>
      <text y="60" text-anchor="middle" font-weight="500">DIAGNOSE</text>
      <text y="78" text-anchor="middle" fill="#5a6c83" font-size="10" letter-spacing="0.05em">residuals + anomalies</text>
    </g>

    <!-- station 5: operate -->
    <g transform="translate(1080, 100)">
      <circle r="36" fill="#0a1119" stroke="#5a6c83" stroke-width="2"/>
      <text y="-50" text-anchor="middle" fill="#00B8C9" font-size="10">05</text>
      <g transform="translate(-12, -12)" stroke="#A8B0BC" stroke-width="1.8" fill="none">
        <path d="M 4 4 L 4 20 L 20 20"/>
        <path d="M 8 16 L 12 12 L 16 14 L 20 8"/>
      </g>
      <text y="60" text-anchor="middle" font-weight="500">OPERATE</text>
      <text y="78" text-anchor="middle" fill="#5a6c83" font-size="10" letter-spacing="0.05em">annotate + export PDF</text>
    </g>
  </g>
</svg>
